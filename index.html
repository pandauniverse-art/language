<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 어학 공부 사이트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        /* 네비게이션 버튼 */
        .nav-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; background-color: #bdc3c7; color: #2c3e50; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #95a5a6; }
        button.active { background-color: #34495e; color: white; }
        
        /* 검색창 디자인 */
        .search-container { display: flex; justify-content: center; margin-bottom: 25px; }
        #search-input { width: 100%; max-width: 500px; padding: 12px 20px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 25px; outline: none; transition: 0.3s; }
        #search-input:focus { border-color: #34495e; box-shadow: 0 0 8px rgba(52, 73, 94, 0.2); }

        /* 콘텐츠 영역 */
        #content-area { display: grid; gap: 15px; grid-template-columns: 1fr; margin-top: 10px; }
        #content-area.grid-mode { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        
        /* 기초 문자용 */
        .char-title { font-size: 36px; font-weight: bold; color: #2980b9; text-align: center; margin-bottom: 10px; }
        .char-sub { font-size: 16px; color: #7f8c8d; text-align: center; line-height: 1.4; }
        
        /* 단어/문장 좌우 분할 디자인 */
        .card.word-mode { display: flex; align-items: center; justify-content: center; }
        .card.word-mode:hover { align-items: flex-start; }
        
        .word-header { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .word-title { font-size: 26px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .pronunciation { font-size: 16px; color: #7f8c8d; margin-bottom: 5px; }
        .meaning { font-size: 18px; font-weight: bold; color: #e74c3c; }
        .hover-hint { font-size: 12px; color: #95a5a6; margin-top: 15px; }
        .card:hover .hover-hint { display: none; }
        
        /* 오른쪽으로 나타나는 예문 (3배 느린 1.2s 애니메이션) */
        .examples-wrapper { display: none; flex: 2; margin-left: 30px; padding-left: 30px; border-left: 1px dashed #bdc3c7; }
        .card.word-mode:hover .examples-wrapper { display: block; animation: fadeInRight 1.2s ease-out forwards; }
        
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .example-box { background-color: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #bdc3c7; }
        .example-text { font-size: 15px; color: #333; margin-bottom: 4px; }
        .example-translation { font-size: 14px; color: #7f8c8d; }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .card.word-mode { flex-direction: column; }
            .examples-wrapper { margin-left: 0; padding-left: 0; border-left: none; border-top: 1px dashed #bdc3c7; margin-top: 20px; padding-top: 15px; }
            @keyframes fadeInRight { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        }

        /* 페이지 네비게이션 (Pagination) */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; flex-wrap: wrap; }
        .page-btn { padding: 8px 15px; background-color: #ecf0f1; border: none; border-radius: 5px; cursor: pointer; color: #2c3e50; font-weight: bold; }
        .page-btn:hover { background-color: #bdc3c7; }
        .page-btn.active { background-color: #2980b9; color: white; }
    </style>
    <script src="data.js"></script>
</head>
<body>

    <h1>📚 나만의 어학 사전</h1>
    
    <div class="nav-group" id="lang-nav">
        <button id="btn-japanese" onclick="setLang('japanese')">🇯🇵 일본어</button>
        <button id="btn-english" onclick="setLang('english')">🇺🇸 영어</button>
    </div>
    
    <div class="nav-group" id="cat-nav"></div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 단어, 뜻, 발음으로 검색해보세요" onkeyup="handleSearch()">
    </div>

    <div id="content-area"></div>
    
    <div class="pagination" id="pagination-area"></div>

    <script>
        const categories = {
            japanese: [
                { id: 'hiragana', name: '히라가나' }, { id: 'katakana', name: '가타카나' },
                { id: 'words', name: '단어장' }, { id: 'sentences', name: '핵심 문장' }
            ],
            english: [
                { id: 'alphabet', name: '알파벳' }, { id: 'words', name: '단어장' },
                { id: 'sentences', name: '핵심 문장' }
            ]
        };

        let currentLang = localStorage.getItem('my_study_lang') || 'japanese';
        let savedCategory = localStorage.getItem('my_study_cat');
        let isValidCat = savedCategory && categories[currentLang].some(c => c.id === savedCategory);
        let currentCategory = isValidCat ? savedCategory : 'words';

        // 페이지 네비게이션용 변수 (한 화면에 보여줄 개수)
        let currentPage = 1;
        const itemsPerPage = 50; 
        let filteredData = [];

        function renderCategoryNav() {
            const catNav = document.getElementById('cat-nav');
            catNav.innerHTML = ''; 
            categories[currentLang].forEach(cat => {
                const btn = document.createElement('button');
                btn.id = `btn-${cat.id}`;
                btn.innerText = cat.name;
                btn.onclick = () => setCategory(cat.id);
                catNav.appendChild(btn);
            });
        }

        function setLang(lang) {
            currentLang = lang;
            currentCategory = 'words'; 
            localStorage.setItem('my_study_lang', currentLang);
            localStorage.setItem('my_study_cat', currentCategory);
            document.getElementById('search-input').value = ''; // 언어 바꿀 때 검색어 초기화
            renderCategoryNav();
            prepareData();
        }

        function setCategory(cat) {
            currentCategory = cat;
            localStorage.setItem('my_study_cat', currentCategory);
            document.getElementById('search-input').value = ''; // 탭 바꿀 때 검색어 초기화
            prepareData();
        }

        // 검색어 입력 시 실행
        function handleSearch() {
            prepareData();
        }

        function updateButtonStyles() {
            document.querySelectorAll('#lang-nav button, #cat-nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${currentLang}`).classList.add('active');
            const activeCatBtn = document.getElementById(`btn-${currentCategory}`);
            if(activeCatBtn) activeCatBtn.classList.add('active');
        }

        // 데이터를 준비하고 검색 필터를 적용하는 함수
        function prepareData() {
            currentPage = 1; // 검색이나 탭 변경 시 무조건 1페이지로
            const rawData = db[currentLang][currentCategory] || [];
            const query = document.getElementById('search-input').value.toLowerCase().trim();

            if (!query) {
                filteredData = rawData;
            } else {
                // 검색어가 있을 경우 필터링
                filteredData = rawData.filter(item => {
                    if (['hiragana', 'katakana', 'alphabet'].includes(currentCategory)) {
                        return item.char.toLowerCase().includes(query) || item.read.toLowerCase().includes(query);
                    } else if (currentLang === 'japanese') {
                        return (item.kanji && item.kanji.includes(query)) || 
                               (item.hiragana && item.hiragana.includes(query)) || 
                               (item.korean && item.korean.includes(query));
                    } else {
                        return (item.word && item.word.toLowerCase().includes(query)) || 
                               (item.korean && item.korean.includes(query));
                    }
                });
            }
            renderData();
        }

        // 페이지 이동 함수
        function goToPage(pageNumber) {
            currentPage = pageNumber;
            renderData();
            window.scrollTo(0, 0); // 페이지 넘길 때 맨 위로 스크롤
        }

        // 실제 화면에 그리는 함수 (페이지네이션 적용)
        function renderData() {
            updateButtonStyles();
            const contentArea = document.getElementById('content-area');
            const paginationArea = document.getElementById('pagination-area');
            contentArea.innerHTML = ''; 
            paginationArea.innerHTML = '';

            if (['hiragana', 'katakana', 'alphabet'].includes(currentCategory)) {
                contentArea.classList.add('grid-mode');
            } else {
                contentArea.classList.remove('grid-mode');
            }

            // 검색 결과가 없을 때
            if (filteredData.length === 0) {
                contentArea.innerHTML = '<div style="text-align:center; padding: 50px; color:#7f8c8d;">검색 결과가 없습니다.</div>';
                return;
            }

            // 현재 페이지에 해당하는 50개만 잘라내기
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            pageData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                if (['hiragana', 'katakana', 'alphabet'].includes(currentCategory)) {
                    card.innerHTML = `
                        <div class="char-title">${item.char}</div>
                        <div class="char-sub"><strong>${item.read}</strong></div>
                    `;
                } else {
                    card.classList.add('word-mode'); 

                    let isJapanese = currentLang === 'japanese';
                    let title = isJapanese ? item.kanji : item.word;
                    let pronunciation = isJapanese ? `<div class="pronunciation">[${item.hiragana}]</div>` : '';
                    let meaning = item.korean;

                    let examplesHtml = (item.examples || []).map(ex => `
                        <div class="example-box">
                            <div class="example-text"><strong>${ex.main}</strong> ${isJapanese ? `<br><span style="font-size: 0.9em; color: #7f8c8d;">${ex.sub}</span>` : ''}</div>
                            <div class="example-translation">${ex.kr}</div>
                        </div>
                    `).join('');

                    card.innerHTML = `
                        <div class="word-header">
                            <div class="word-title">${title}</div>
                            ${pronunciation}
                            <div class="meaning">${meaning}</div>
                            <div class="hover-hint">🖱️ 마우스를 올리면 예문 확인</div>
                        </div>
                        <div class="examples-wrapper">${examplesHtml}</div>
                    `;
                }
                contentArea.appendChild(card);
            });

            // 페이지 버튼 생성 로직
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => goToPage(i);
                    paginationArea.appendChild(btn);
                }
            }
        }

        renderCategoryNav();
        prepareData(); // 초기 데이터 로딩 및 렌더링
    </script>
</body>
</html>
