<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 어학 공부 사이트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h1 { text-align: center; color: #2c3e50; }
        .nav-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        button { padding: 10px 20px; border: none; background-color: #bdc3c7; color: #2c3e50; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #95a5a6; }
        button.active { background-color: #34495e; color: white; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 문자(알파벳/가나)용 디자인 */
        .char-title { font-size: 40px; font-weight: bold; color: #2980b9; text-align: center; margin-bottom: 5px; }
        .char-sub { font-size: 18px; color: #7f8c8d; text-align: center; }
        
        /* 단어/문장용 디자인 */
        .word-title { font-size: 28px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .pronunciation { font-size: 18px; color: #7f8c8d; margin-bottom: 10px; }
        .meaning { font-size: 20px; font-weight: bold; color: #e74c3c; margin-bottom: 20px; }
        .example-box { background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #bdc3c7; }
        .example-text { font-size: 16px; color: #333; margin-bottom: 5px; }
        .example-translation { font-size: 15px; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>📚 나만의 어학 사전</h1>
    
    <div class="nav-group" id="lang-nav">
        <button id="btn-japanese" onclick="setLang('japanese')">🇯🇵 일본어</button>
        <button id="btn-english" onclick="setLang('english')">🇺🇸 영어</button>
    </div>

    <div class="nav-group" id="cat-nav">
        <button id="btn-chars" onclick="setCategory('chars')">기초 문자</button>
        <button id="btn-words" onclick="setCategory('words')">단어장</button>
        <button id="btn-sentences" onclick="setCategory('sentences')">핵심 문장</button>
    </div>

    <div id="content-area"></div>

    <script>
        // 현재 선택된 상태 저장
        let currentLang = 'japanese';
        let currentCategory = 'words';

        // ================= 데이터베이스 =================
        const db = {
            japanese: {
                chars: [
                    { char: "あ / ア", read: "a (아)", detail: "히라가나 'あ' / 가타카나 'ア'" },
                    { char: "い / イ", read: "i (이)", detail: "히라가나 'い' / 가타카나 'イ'" },
                    { char: "う / ウ", read: "u (우)", detail: "히라가나 'う' / 가타카나 'ウ'" }
                ],
                words: [
                    {
                        kanji: "発展",
                        hiragana: "はってん",
                        korean: "발전",
                        examples: [
                            { main: "経済が大きく発展する。", sub: "けいざいがおおきくはってんする。", kr: "경제가 크게 발전하다." },
                            { main: "両国の関係が発展を遂げた。", sub: "りょうこくのかんけいがはってんをとげた。", kr: "양국 관계가 발전을 이루었다." },
                            { main: "この町は急速に発展している。", sub: "このまちはきゅうそくにはってんしている。", kr: "이 마을은 급속히 발전하고 있다." }
                        ]
                    },
                    {
                        kanji: "習慣",
                        hiragana: "しゅうかん",
                        korean: "습관",
                        examples: [
                            { main: "早起きの習慣をつける。", sub: "はやおきのしゅうかんをつける。", kr: "일찍 일어나는 습관을 기르다." },
                            { main: "食習慣を見直す。", sub: "しょくしゅうかんをみなおす。", kr: "식습관을 재검토하다." }
                        ]
                    }
                ],
                sentences: [
                    {
                        kanji: "お世話になっております。",
                        hiragana: "おせわになっております。",
                        korean: "신세 지고 있습니다. (비즈니스 인사말)",
                        examples: [
                            { main: "いつも大変お世話になっております。", sub: "いつもたいへんおせわになっております。", kr: "항상 대단히 신세 지고 있습니다." }
                        ]
                    }
                ]
            },
            english: {
                chars: [
                    { char: "A a", read: "[eɪ] 에이", detail: "예: Apple" },
                    { char: "B b", read: "[biː] 비-", detail: "예: Banana" },
                    { char: "C c", read: "[siː] 씨-", detail: "예: Cat" }
                ],
                words: [
                    {
                        word: "Implement",
                        korean: "실행하다, 도입하다",
                        examples: [
                            { main: "The government implemented a new policy.", kr: "정부는 새로운 정책을 실행했다." },
                            { main: "We need to implement the changes immediately.", kr: "우리는 그 변경 사항을 즉시 도입해야 한다." }
                        ]
                    },
                    {
                        word: "Substantial",
                        korean: "상당한, 크고 중요한",
                        examples: [
                            { main: "There was a substantial increase in sales.", kr: "매출에 상당한 증가가 있었다." },
                            { main: "She made a substantial contribution to the project.", kr: "그녀는 프로젝트에 상당한 기여를 했다." }
                        ]
                    }
                ],
                sentences: [
                    {
                        word: "I look forward to hearing from you.",
                        korean: "당신의 답장을 고대하고 있겠습니다. (이메일 맺음말)",
                        examples: [
                            { main: "We look forward to working with you.", kr: "당신과 함께 일하기를 고대합니다." }
                        ]
                    }
                ]
            }
        };

        // ================= 화면 렌더링 함수 =================
        function updateButtons() {
            document.querySelectorAll('#lang-nav button, #cat-nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${currentLang}`).classList.add('active');
            document.getElementById(`btn-${currentCategory}`).classList.add('active');
        }

        function setLang(lang) {
            currentLang = lang;
            renderData();
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderData();
        }

        function renderData() {
            updateButtons();
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ''; 

            const dataList = db[currentLang][currentCategory];

            dataList.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                // 1. 기초 문자 모드일 때
                if (currentCategory === 'chars') {
                    card.innerHTML = `
                        <div class="char-title">${item.char}</div>
                        <div class="char-sub"><strong>${item.read}</strong> <br> ${item.detail}</div>
                    `;
                } 
                // 2. 단어/문장 모드일 때 (일본어)
                else if (currentLang === 'japanese') {
                    let examplesHtml = item.examples.map(ex => `
                        <div class="example-box">
                            <div class="example-text"><strong>${ex.main}</strong> <br><span style="font-size: 0.9em; color: #7f8c8d;">${ex.sub}</span></div>
                            <div class="example-translation">${ex.kr}</div>
                        </div>
                    `).join('');

                    card.innerHTML = `
                        <div class="word-title">${item.kanji}</div>
                        <div class="pronunciation">[${item.hiragana}]</div>
                        <div class="meaning">${item.korean}</div>
                        <div>${examplesHtml}</div>
                    `;
                } 
                // 3. 단어/문장 모드일 때 (영어)
                else if (currentLang === 'english') {
                    let examplesHtml = item.examples.map(ex => `
                        <div class="example-box">
                            <div class="example-text"><strong>${ex.main}</strong></div>
                            <div class="example-translation">${ex.kr}</div>
                        </div>
                    `).join('');

                    card.innerHTML = `
                        <div class="word-title">${item.word}</div>
                        <div class="meaning">${item.korean}</div>
                        <div>${examplesHtml}</div>
                    `;
                }
                contentArea.appendChild(card);
            });
        }

        // 초기 실행
        renderData();
    </script>
</body>
</html>
